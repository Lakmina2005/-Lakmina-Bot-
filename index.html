<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB7ZbhU6H_fGkZu4cWR4eyc8d0gakK7kdY",
    authDomain: "mywhatsappchat-7cb60.firebaseapp.com",
    projectId: "mywhatsappchat-7cb60",
    storageBucket: "mywhatsappchat-7cb60.firebasestorage.app",
    messagingSenderId: "479602961695",
    appId: "1:479602961695:web:9e07a177da2235d9b2142a",
    measurementId: "G-RE0HDT0FXD"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const sendBtn = document.getElementById('sendBtn');
  const msgInput = document.getElementById('msgInput');
  const usernameInput = document.getElementById('username');
  const chatWindow = document.getElementById('chat-window');

  sendBtn.onclick = async () => {
    const text = msgInput.value.trim();
    const user = usernameInput.value.trim() || "User";
    if (text !== "") {
      // මෙතැන 'chats' කියන නම Firebase එකේ තියෙන නමට සමාන විය යුතුයි
      await addDoc(collection(db, "chats"), {
        sender: user,
        message: text,
        timestamp: serverTimestamp()
      });
      msgInput.value = "";
    }
  };

  const q = query(collection(db, "chats"), orderBy("timestamp", "asc"));
  onSnapshot(q, (snapshot) => {
    chatWindow.innerHTML = "";
    snapshot.forEach(doc => {
      const data = doc.data();
      const isMe = data.sender === usernameInput.value;
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${isMe ? 'sent' : 'received'}`;
      msgDiv.innerHTML = `<span class="sender-name">${data.sender}</span>${data.message}`;
      chatWindow.appendChild(msgDiv);
    });
    chatWindow.scrollTop = chatWindow.scrollHeight;
  });
</script>
