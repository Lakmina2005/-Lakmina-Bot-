<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Private Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b141a; display: flex; justify-content: center; height: 100vh; }
        
        .app-container { width: 100%; max-width: 450px; background: #0b141a; display: flex; flex-direction: column; border: 1px solid #2d3748; position: relative; }

        /* WhatsApp Header */
        .header { background: #202c33; padding: 12px 16px; display: flex; align-items: center; gap: 15px; color: #e9edef; z-index: 10; }
        .header .avatar { width: 40px; height: 40px; background: #6a7175; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Chat Window */
        #chat-window { flex: 1; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: #0b141a; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }

        .msg { max-width: 80%; padding: 8px 12px; border-radius: 8px; font-size: 14px; position: relative; line-height: 1.4; color: #e9edef; }
        .sent { align-self: flex-end; background: #005c4b; border-top-right-radius: 0; }
        .received { align-self: flex-start; background: #202c33; border-top-left-radius: 0; }
        
        .sender-name { font-size: 11px; font-weight: bold; color: #ffb444; display: block; margin-bottom: 2px; }
        .time { font-size: 10px; color: #8696a0; float: right; margin-top: 5px; margin-left: 10px; }

        /* Input Area */
        .input-area { background: #202c33; padding: 10px; display: flex; align-items: center; gap: 10px; }
        #username { width: 85px; background: #2a3942; border: 1px solid #00a884; color: white; padding: 8px; border-radius: 8px; outline: none; }
        #msgInput { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 8px; color: white; outline: none; }
        #sendBtn { background: #00a884; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="avatar">U</div>
            <div>
                <h4 style="font-size: 15px;">Private Chat</h4>
                <p style="font-size: 12px; color: #00a884;">online</p>
            </div>
        </div>

        <div id="chat-window"></div>

        <div class="input-area">
            <input type="text" id="username" placeholder="ඔබේ නම">
            <input type="text" id="msgInput" placeholder="පණිවිඩය..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB7ZbhU6H_fGkZu4cWR4eyc8d0gakK7kdY",
            authDomain: "mywhatsappchat-7cb60.firebaseapp.com",
            projectId: "mywhatsappchat-7cb60",
            storageBucket: "mywhatsappchat-7cb60.firebasestorage.app",
            messagingSenderId: "479602961695",
            appId: "1:479602961695:web:9e07a177da2235d9b2142a",
            measurementId: "G-RE0HDT0FXD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const chatsRef = collection(db, "private_messages");

        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const usernameInput = document.getElementById('username');
        const chatWindow = document.getElementById('chat-window');

        async function sendMessage() {
            const text = msgInput.value.trim();
            const user = usernameInput.value.trim() || "Guest";
            if (text) {
                await addDoc(chatsRef, {
                    sender: user,
                    message: text,
                    time: serverTimestamp()
                });
                msgInput.value = "";
            }
        }

        sendBtn.onclick = sendMessage;
        msgInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        const q = query(chatsRef, orderBy("time", "asc"));
        onSnapshot(q, (snapshot) => {
            chatWindow.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const isMe = data.sender === usernameInput.value;
                const timeStr = data.time ? new Date(data.time.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "";

                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'sent' : 'received'}`;
                div.innerHTML = `
                    <span class="sender-name">${isMe ? 'ඔබ' : data.sender}</span>
                    ${data.message}
                    <span class="time">${timeStr}</span>
                `;
                chatWindow.appendChild(div);
            });
            chatWindow.scrollTop = chatWindow.scrollHeight;
        });
    </script>
</body>
</html>
